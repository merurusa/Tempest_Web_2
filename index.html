<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tempest | Group Site</title>
    <meta name="description" content="Tempestグループ公式サイト。京橋のBar、コンカフェ、Poker Bar、居酒屋の店舗一覧。">
    <link rel="stylesheet" href="styles.css?v=20260703-0015">
  </head>
  <body class="top-page">
    <header class="site-header top-header">
      <a class="brand" href="index.html" aria-label="Tempest トップへ">
        <span class="brand-mark">T</span>
        <span>Tempest</span>
      </a>
    </header>

    <main>
      <section class="hero top-hero">
        <img class="hero-image" src="assets/hero-tempest.png" alt="京橋の夜とネオンのイメージ">
        <div class="hero-overlay"></div>
        <div class="hero-content top-hero-content">
          <p class="eyebrow">Kyobashi Night Spots</p>
          <h1>Tempest Group</h1>
        </div>
      </section>

      <section class="top-shop-section" aria-label="店舗一覧">
        <div class="top-shop-grid">
          <a class="shop-banner various" href="shops/various.html" aria-label="Variousの店舗ページへ">
            <img src="assets/shop-various-bg.png" alt="">
            <span class="shop-banner-shade"></span>
            <span class="shop-banner-text">
              <strong>Various</strong>
              <small>Mix Bar</small>
            </span>
          </a>

          <a class="shop-banner solomon" href="shops/solomon.html" aria-label="Solomonの店舗ページへ">
            <img src="assets/shop-solomon-bg.png" alt="">
            <span class="shop-banner-shade"></span>
            <span class="shop-banner-text">
              <strong>Solomon</strong>
              <small>Concept Cafe</small>
            </span>
          </a>

          <a class="shop-banner lively" href="shops/lively.html" aria-label="Livelyの店舗ページへ">
            <img src="assets/shop-lively-bg.png" alt="">
            <span class="shop-banner-shade"></span>
            <span class="shop-banner-text">
              <strong>Lively</strong>
              <small>Poker Bar</small>
            </span>
          </a>

          <a class="shop-banner charme" href="shops/charme.html" aria-label="Charmeの店舗ページへ">
            <img src="assets/shop-charme-bg.png" alt="">
            <span class="shop-banner-shade"></span>
            <span class="shop-banner-text">
              <strong>Charme</strong>
              <small>ConceptCafe&amp;Bar</small>
            </span>
          </a>

          <a class="shop-banner strive" href="shops/strive.html" aria-label="Striveの店舗ページへ">
            <img src="assets/shop-strive-bg.png" alt="">
            <span class="shop-banner-shade"></span>
            <span class="shop-banner-text">
              <strong>Strive</strong>
              <small>Mix Bar</small>
            </span>
          </a>

          <a class="shop-banner ebichan" href="shops/ebichanchi.html" aria-label="えびちゃん家の店舗ページへ">
            <img src="assets/shop-ebichanchi-bg.png" alt="">
            <span class="shop-banner-shade"></span>
            <span class="shop-banner-text">
              <strong>えびちゃん家</strong>
              <small>Gay Bar / Izakaya</small>
            </span>
          </a>
        </div>

        <div class="app-store-links" aria-label="アプリストアリンク">
          <a class="store-button app-store" href="#" aria-label="App Storeでダウンロード">
            <span>Download on the</span>
            <strong>App Store</strong>
          </a>
          <a class="store-button google-play" href="#" aria-label="Google Playでダウンロード">
            <span>GET IT ON</span>
            <strong>Google Play</strong>
          </a>
        </div>
      </section>
    </main>

    <footer class="site-footer top-footer">
      <span>Tempest</span>
      <span>&copy; 2026 Tempest</span>
    </footer>
  </body>
</html>
